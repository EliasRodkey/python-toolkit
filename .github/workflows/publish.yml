name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build pleasant-loggers
        run: uv build --package pleasant-loggers

      - name: Build pleasant-database
        run: uv build --package pleasant-database

      - name: Publish to PyPI
        run: uv publish