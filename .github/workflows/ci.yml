name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      loggers: ${{ steps.changed.outputs.loggers }}
      database: ${{ steps.changed.outputs.database }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history needed for cross-branch diff

      - name: Detect which packages changed
        id: changed
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed_files.txt
          cat changed_files.txt
          echo "loggers=$(grep -c 'packages/pleasant_loggers/' changed_files.txt || true)" >> $GITHUB_OUTPUT
          echo "database=$(grep -c 'packages/pleasant_database/' changed_files.txt || true)" >> $GITHUB_OUTPUT

  test-loggers:
    needs: detect-changes
    if: needs.detect-changes.outputs.loggers != '0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: uv sync --package pleasant-loggers
      - name: Run tests
        run: uv run --package pleasant-loggers pytest packages/pleasant_loggers/tests/

  test-database:
    needs: detect-changes
    if: needs.detect-changes.outputs.database != '0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: uv sync --package pleasant-database
      - name: Run tests
        run: uv run --package pleasant-database pytest packages/pleasant_database/tests/