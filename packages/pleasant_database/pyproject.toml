[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pleasant-database"
version = "1.3.3"
description = "package for handling local database files and data"
authors = [{name = "Elias Rodkey", email = "elias.rodkey@gmail.com"}]
readme = "README.md"
license = {text = "MIT"}
dependencies = [
    "requests", 
    "numpy", 
    "sqlalchemy", 
    "pleasant-loggers", 
    "pandas"
    ] 

[tool.setuptools.packages.find]
where = ["."]
exclude = ["tests*", "test*"]

[project.optional-dependencies]
dev = ["pytest"]