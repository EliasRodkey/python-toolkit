[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pleasant-loggers"
version = "1.5.5"
description = "robust and generic logging system for Python"
authors = [{name = "Elias Rodkey", email = "elias.rodkey@gmail.com"}]
readme = "README.md"
license = {text = "MIT"}
dependencies = []

[tool.setuptools.packages.find]
where = ["."]
exclude = ["tests*", "test*"]

[project.optional-dependencies]
dev = ["pytest"]
