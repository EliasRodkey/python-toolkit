[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pleasant-loggers"
version = "2.0.1"
description = "robust and generic logging system for Python"
authors = [{name = "Elias Rodkey", email = "elias.rodkey@gmail.com"}]
readme = "README.md"
license = {text = "MIT"}
dependencies = [
    "structlog>=24.0",
]

[tool.setuptools.packages.find]
where = ["."]
exclude = ["tests*", "test*"]

[project.optional-dependencies]
analysis = ["pandas>=2.0"]
dev = ["pytest"]

[project.scripts]
pleasant-logs = "pleasant_loggers._analysis:cli_main"
